<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ödeme Başarılı | Concept Store</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #f4f7f6;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .card {
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        text-align: center;
        max-width: 400px;
        width: 100%;
      }
      .icon {
        width: 64px;
        height: 64px;
        background: #d4edda;
        color: #28a745;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
      }
      h1 {
        color: #2d3436;
        margin-bottom: 10px;
      }
      p {
        color: #636e72;
        line-height: 1.6;
      }
      .btn {
        display: inline-block;
        margin-top: 25px;
        padding: 12px 25px;
        background: #00b894;
        color: white;
        text-decoration: none;
        border-radius: 6px;
        font-weight: 600;
        transition: 0.3s;
      }
      .btn:hover {
        background: #00947a;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">
        <svg
          width="32"
          height="32"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="3"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
      <h1>Ödeme Başarılı!</h1>
      <p>
        Siparişiniz onaylandı. Onay maili birazdan size ulaşacaktır. Bizi tercih
        ettiğiniz için teşekkürler!
      </p>
      <a href="http://localhost:3000" class="btn">Mağazaya Dön</a>
    </div>
  </body>
</html>
